<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neon Drift</title>
  <style>
    :root{color-scheme:dark;--ink:#f9f7ff;--muted:#a9b0ff;--cyan:#00f5ff;--pink:#ff2bd6;--violet:#7c3cff;--acid:#e7ff38;--void:#02010a;--panel:rgba(10,5,28,.68);--line:rgba(255,255,255,.18)}
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--void);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{user-select:none;touch-action:none}canvas{display:block;width:100vw;height:100vh;background:#02010a}.hud{position:fixed;inset:0;pointer-events:none;padding:clamp(14px,2.6vw,28px);display:grid;grid-template-rows:auto 1fr auto;gap:18px}.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}.brand{display:grid;gap:3px;text-transform:uppercase;letter-spacing:.18em;font-weight:900;font-size:clamp(12px,1.1vw,15px);color:#c7ccff;text-shadow:0 0 18px rgba(0,245,255,.65)}.brand strong{font-size:clamp(24px,4.8vw,58px);line-height:.9;letter-spacing:0;color:#fff;text-shadow:0 0 8px var(--cyan),0 0 28px var(--pink),0 0 56px var(--violet)}.stats{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:8px;max-width:min(520px,60vw)}.stat{min-width:92px;padding:10px 12px;border:1px solid rgba(0,245,255,.28);background:linear-gradient(135deg,rgba(255,43,214,.2),rgba(0,245,255,.08)),var(--panel);backdrop-filter:blur(18px);border-radius:8px;box-shadow:0 0 22px rgba(0,245,255,.16),0 18px 55px rgba(0,0,0,.28)}.stat span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.12em}.stat b{display:block;margin-top:2px;font-size:23px;line-height:1;font-variant-numeric:tabular-nums}.center{display:grid;place-items:center;text-align:center}.panel{width:min(640px,calc(100vw - 32px));padding:clamp(22px,4vw,42px);border:1px solid rgba(0,245,255,.34);border-radius:8px;background:linear-gradient(135deg,rgba(255,43,214,.22),transparent 34%),linear-gradient(225deg,rgba(0,245,255,.18),transparent 38%),rgba(6,3,20,.82);backdrop-filter:blur(24px);box-shadow:0 0 44px rgba(124,60,255,.28),0 28px 90px rgba(0,0,0,.55);pointer-events:auto;transform:translateY(0);transition:opacity .28s ease,transform .28s ease}.panel[hidden]{opacity:0;pointer-events:none;transform:translateY(16px) scale(.98)}.panel h1{margin:0;font-size:clamp(42px,9vw,96px);line-height:.82;text-transform:uppercase;text-shadow:0 0 12px var(--cyan),0 0 44px var(--pink)}.panel p{margin:18px auto 0;max-width:42rem;color:#e1e5ff;font-size:clamp(15px,2.4vw,18px);line-height:1.55}.actions{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;margin-top:28px}button{appearance:none;border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:13px 18px;background:linear-gradient(90deg,var(--cyan),var(--pink));color:#050013;font:inherit;font-weight:950;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;box-shadow:0 0 30px rgba(255,43,214,.45)}button.secondary{background:rgba(255,255,255,.04);color:var(--ink);box-shadow:0 0 16px rgba(0,245,255,.16)}.bottom{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;color:var(--muted);font-size:12px;letter-spacing:.08em;text-transform:uppercase}.meter{width:min(260px,48vw);height:9px;overflow:hidden;border:1px solid rgba(0,245,255,.3);border-radius:999px;background:rgba(255,255,255,.08)}.meter i{display:block;width:0%;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--cyan),var(--acid),var(--pink));box-shadow:0 0 18px rgba(231,255,56,.58)}.debug{position:fixed;left:12px;bottom:12px;z-index:18;min-width:172px;padding:9px 10px;border:1px solid rgba(231,255,56,.34);border-radius:8px;background:rgba(5,2,18,.72);backdrop-filter:blur(14px);box-shadow:0 0 22px rgba(231,255,56,.14);color:#e7ff38;font:12px/1.45 ui-monospace,SFMono-Regular,Consolas,monospace;pointer-events:none}.debug[hidden]{display:none}.debug b{color:#fff;font-weight:800}
    @media(max-width:680px){.hud{padding:12px}.topbar{align-items:stretch}.brand strong{font-size:32px}.stats{max-width:56vw;gap:6px}.stat{min-width:74px;padding:8px}.stat b{font-size:18px}.bottom{font-size:10px}.debug{bottom:58px}}
  </style>
</head>
<body>
<canvas id="game" aria-label="Neon Drift game canvas"></canvas>
<div class="hud"><div class="topbar"><div class="brand"><span>Arcade run</span><strong>Neon Drift</strong></div><div class="stats"><div class="stat"><span>Score</span><b id="score">0</b></div><div class="stat"><span>Combo</span><b id="combo">x1</b></div><div class="stat"><span>Best</span><b id="best">0</b></div></div></div><div class="center"><section class="panel" id="menu"><h1>Neon Drift</h1><p>Thread the gate stream, steal prism shards, and trigger overdrive before the drones turn the lane into static.</p><div class="actions"><button id="start">Start run</button><button class="secondary" id="mute">Sound on</button></div></section></div><div class="bottom"><div>Move: WASD / arrows / pointer</div><div><div>Overdrive</div><div class="meter"><i id="boost"></i></div></div></div></div>
<div class="debug" id="debug" hidden></div>
<script>
(()=>{
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),scoreEl=document.getElementById("score"),comboEl=document.getElementById("combo"),bestEl=document.getElementById("best"),boostEl=document.getElementById("boost"),debugEl=document.getElementById("debug"),menu=document.getElementById("menu"),startBtn=document.getElementById("start"),muteBtn=document.getElementById("mute"),TAU=Math.PI*2,keys=new Set(),pointer={active:false,x:0,y:0},audio={ctx:null,muted:false,warmed:false},adminState={godMode:false,scoreMultiplier:1};let width=0,height=0,dpr=1,last=0,running=false,shake=0,spawnGate=0,spawnShard=0,spawnDrone=0,score=0,combo=1,best=Number(localStorage.getItem("neon-drift-best")||0);const ship={x:0,y:0,vx:0,vy:0,r:14,boost:0,inv:0,trail:[]},stars=[],gates=[],shards=[],drones=[],bursts=[],debug={enabled:location.hash.toLowerCase().includes("debug"),fps:0,frames:0,acc:0,worst:0,spikes:0,gatePasses:0,lastGateMs:0,lastFrameMs:0};bestEl.textContent=best;
function resize(){dpr=Math.min(2,devicePixelRatio||1);width=innerWidth;height=innerHeight;canvas.width=Math.floor(width*dpr);canvas.height=Math.floor(height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);if(!stars.length){for(let i=0;i<210;i++)stars.push({x:Math.random()*width,y:Math.random()*height,z:Math.random()*1+.25,h:Math.random()*360})}}
function warmAudio(){if(audio.muted||audio.warmed)return;const Audio=window.AudioContext||window.webkitAudioContext;if(!Audio)return;audio.ctx||=new Audio();if(audio.ctx.state==="suspended")audio.ctx.resume();audio.warmed=true}
function tone(freq,dur=.08,type="sine",gain=.035){if(audio.muted)return;warmAudio();if(!audio.ctx)return;const now=audio.ctx.currentTime,osc=audio.ctx.createOscillator(),vol=audio.ctx.createGain();osc.type=type;osc.frequency.setValueAtTime(freq,now);osc.frequency.exponentialRampToValueAtTime(freq*.62,now+dur);vol.gain.setValueAtTime(gain,now);vol.gain.exponentialRampToValueAtTime(.0001,now+dur);osc.connect(vol).connect(audio.ctx.destination);osc.start(now);osc.stop(now+dur)}
function setDebug(enabled){debug.enabled=Boolean(enabled);debugEl.hidden=!debug.enabled;if(debug.enabled){updateDebugPanel();console.info("Neon Drift debug enabled: local FPS, frame spikes, and gate-pass timing only.")} }
function updateDebugPanel(){if(!debug.enabled)return;debugEl.innerHTML=`<b>Debug</b><br>FPS ${debug.fps.toFixed(0)} | frame ${debug.lastFrameMs.toFixed(1)}ms<br>Worst ${debug.worst.toFixed(1)}ms | spikes ${debug.spikes}<br>Gates ${debug.gatePasses} | pass ${debug.lastGateMs.toFixed(2)}ms`}
function recordFrame(ms,dt){if(!debug.enabled)return;debug.frames++;debug.acc+=dt;debug.worst=Math.max(debug.worst,ms);debug.lastFrameMs=ms;if(ms>50){debug.spikes++;console.warn("Neon Drift frame spike",{ms:Number(ms.toFixed(2)),score:Math.floor(score),combo,objects:{gates:gates.length,shards:shards.length,drones:drones.length,particles:bursts.length}})}if(debug.acc>=.5){debug.fps=debug.frames/debug.acc;debug.frames=0;debug.acc=0;updateDebugPanel()}}
function reset(){warmAudio();Object.assign(ship,{x:width*.24,y:height*.5,vx:0,vy:0,boost:22,inv:1.2});ship.trail.length=gates.length=shards.length=drones.length=bursts.length=0;spawnGate=.2;spawnShard=.9;spawnDrone=2.8;score=0;combo=1;shake=0;running=true;menu.hidden=true;updateHud()}
function gameOver(){running=false;shake=24;burst(ship.x,ship.y,"#ff2bd6",70,260);tone(90,.34,"sawtooth",.065);best=Math.max(best,Math.floor(score));localStorage.setItem("neon-drift-best",best);bestEl.textContent=best;menu.querySelector("h1").textContent="Run Ended";menu.querySelector("p").textContent=`Score ${Math.floor(score)}. Best ${best}. Slip back into the stream?`;startBtn.textContent="Restart";setTimeout(()=>menu.hidden=false,500)}
function updateHud(){scoreEl.textContent=Math.floor(score);comboEl.textContent=`x${combo}`;boostEl.style.width=`${Math.max(0,Math.min(100,ship.boost))}%`}
function burst(x,y,color,count=16,power=130){for(let i=0;i<count;i++){const a=Math.random()*TAU,s=(Math.random()*.7+.3)*power;bursts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:Math.random()*.45+.35,max:.8,color,size:Math.random()*3+1.4})}}
function addGate(){const gap=Math.max(124,height*(.32-Math.min(.14,score/80000))),cy=gap/2+50+Math.random()*Math.max(40,height-gap-100);gates.push({x:width+90,cy,gap,w:34,speed:245+Math.min(230,score/85),passed:false,pulse:Math.random()*TAU})}
function addShard(){shards.push({x:width+40,y:50+Math.random()*(height-100),r:9,speed:210+Math.min(220,score/110),spin:Math.random()*TAU})}
function addDrone(){drones.push({x:width+60,y:70+Math.random()*(height-140),r:17,speed:185+Math.min(260,score/100),phase:Math.random()*TAU,amp:38+Math.random()*80})}
function steer(dt){let ax=0,ay=0;if(keys.has("ArrowLeft")||keys.has("KeyA"))ax--;if(keys.has("ArrowRight")||keys.has("KeyD"))ax++;if(keys.has("ArrowUp")||keys.has("KeyW"))ay--;if(keys.has("ArrowDown")||keys.has("KeyS"))ay++;if(pointer.active){ax+=(pointer.x-ship.x)/160;ay+=(pointer.y-ship.y)/160}const boosting=(keys.has("Space")||keys.has("ShiftLeft")||keys.has("ShiftRight")||pointer.active)&&ship.boost>0,thrust=boosting?1180:760,drag=boosting?.942:.925;ship.vx=(ship.vx+ax*thrust*dt)*drag;ship.vy=(ship.vy+ay*thrust*dt)*drag;ship.x+=ship.vx*dt;ship.y+=ship.vy*dt;ship.x=Math.max(ship.r+6,Math.min(width-ship.r-6,ship.x));ship.y=Math.max(ship.r+6,Math.min(height-ship.r-6,ship.y));ship.boost+=(boosting?-32:14)*dt;ship.boost=Math.max(0,Math.min(100,ship.boost));ship.inv=Math.max(0,ship.inv-dt);ship.trail.unshift({x:ship.x,y:ship.y,life:1,boost:boosting});ship.trail=ship.trail.filter((p,i)=>i<34&&(p.life-=dt*2.6)>0)}
function tick(dt){spawnGate-=dt;spawnShard-=dt;spawnDrone-=dt;if(spawnGate<=0){addGate();spawnGate=Math.max(.72,1.38-score/42000)}if(spawnShard<=0){addShard();spawnShard=Math.max(.45,.92-score/70000)}if(spawnDrone<=0){addDrone();spawnDrone=Math.max(.74,2.6-score/30000)}steer(dt);score+=dt*(22+combo*3)*adminState.scoreMultiplier;for(const s of stars){s.x-=(70+260*s.z+score/260)*dt;if(s.x<-10){s.x=width+10;s.y=Math.random()*height;s.z=Math.random()*1+.25}}for(const g of gates){g.x-=g.speed*dt;g.pulse+=dt*4;if(!g.passed&&g.x+g.w<ship.x){const passStart=performance.now();g.passed=true;combo=Math.min(9,combo+1);score+=160*combo*adminState.scoreMultiplier;ship.boost=Math.min(100,ship.boost+11);burst(g.x,g.cy,"#00f5ff",12,105);tone(380+combo*42,.07,"triangle",.028);if(debug.enabled){debug.gatePasses++;debug.lastGateMs=performance.now()-passStart;console.debug("Neon Drift gate pass",{ms:Number(debug.lastGateMs.toFixed(2)),score:Math.floor(score),combo,particles:bursts.length});updateDebugPanel()}}const inX=Math.abs(ship.x-g.x)<g.w+ship.r,badY=ship.y<g.cy-g.gap/2+ship.r||ship.y>g.cy+g.gap/2-ship.r;if(running&&!adminState.godMode&&ship.inv<=0&&inX&&badY)gameOver()}for(const s of shards){s.x-=s.speed*dt;s.spin+=dt*8;if(dist(ship,s)<ship.r+s.r+7){s.dead=true;combo=Math.min(9,combo+1);score+=90*combo*adminState.scoreMultiplier;ship.boost=Math.min(100,ship.boost+8);burst(s.x,s.y,"#e7ff38",22,160);tone(680+Math.random()*180,.06,"sine",.04)}}for(const d of drones){d.x-=d.speed*dt;d.phase+=dt*3;d.y+=Math.sin(d.phase)*d.amp*dt;if(running&&!adminState.godMode&&ship.inv<=0&&dist(ship,d)<ship.r+d.r)gameOver()}for(const p of bursts){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.98;p.vy*=.98;p.life-=dt}clean(gates);clean(shards);clean(drones);clean(bursts,true);shake=Math.max(0,shake-dt*30);updateHud()}
function clean(arr,particle=false){for(let i=arr.length-1;i>=0;i--)if(arr[i].dead||arr[i].x<-150||(particle&&arr[i].life<=0))arr.splice(i,1)}function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function draw(){const sx=shake?(Math.random()-.5)*shake:0,sy=shake?(Math.random()-.5)*shake:0;ctx.save();ctx.clearRect(0,0,width,height);ctx.translate(sx,sy);const bg=ctx.createRadialGradient(width*.35,height*.42,0,width*.5,height*.5,Math.max(width,height));bg.addColorStop(0,"#210047");bg.addColorStop(.38,"#08001f");bg.addColorStop(1,"#02010a");ctx.fillStyle=bg;ctx.fillRect(-40,-40,width+80,height+80);ctx.save();ctx.globalCompositeOperation="lighter";for(const s of stars){ctx.fillStyle=`hsla(${185+s.h%120},100%,${62+s.z*18}%,${.16+s.z*.42})`;ctx.fillRect(s.x,s.y,1+s.z*2.4,1+s.z*2.4)}ctx.restore();drawLane();gates.forEach(drawGate);shards.forEach(drawShard);drones.forEach(drawDrone);drawShip();bursts.forEach(drawParticle);ctx.restore()}
function drawLane(){ctx.save();ctx.globalAlpha=.28;ctx.strokeStyle="#7c3cff";ctx.lineWidth=1;for(let y=0;y<height;y+=46){ctx.beginPath();ctx.moveTo(0,y+Math.sin((score+y)*.008)*16);ctx.bezierCurveTo(width*.3,y+20,width*.68,y-20,width,y+Math.cos(score*.01+y)*16);ctx.stroke()}ctx.restore()}
function drawGate(g){const glow=.5+Math.sin(g.pulse)*.25;ctx.save();ctx.globalCompositeOperation="lighter";ctx.lineWidth=g.w;ctx.strokeStyle=`rgba(0,245,255,${.3+glow*.24})`;ctx.shadowColor="#00f5ff";ctx.shadowBlur=32;ctx.beginPath();ctx.moveTo(g.x,-20);ctx.lineTo(g.x,g.cy-g.gap/2);ctx.moveTo(g.x,g.cy+g.gap/2);ctx.lineTo(g.x,height+20);ctx.stroke();ctx.lineWidth=2;ctx.strokeStyle="rgba(255,43,214,.95)";ctx.shadowColor="#ff2bd6";ctx.shadowBlur=14;ctx.beginPath();ctx.arc(g.x,g.cy-g.gap/2,12,0,TAU);ctx.arc(g.x,g.cy+g.gap/2,12,0,TAU);ctx.stroke();ctx.restore()}
function drawShard(s){ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.spin);ctx.globalCompositeOperation="lighter";ctx.shadowColor="#e7ff38";ctx.shadowBlur=26;ctx.fillStyle="#e7ff38";ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(10,0);ctx.lineTo(0,14);ctx.lineTo(-10,0);ctx.closePath();ctx.fill();ctx.restore()}
function drawDrone(d){ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.phase);ctx.globalCompositeOperation="lighter";ctx.strokeStyle="#ff2bd6";ctx.fillStyle="rgba(255,43,214,.16)";ctx.shadowColor="#ff2bd6";ctx.shadowBlur=25;ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,d.r,0,TAU);ctx.fill();ctx.stroke();for(let i=0;i<4;i++){ctx.rotate(Math.PI/2);ctx.beginPath();ctx.moveTo(d.r+4,0);ctx.lineTo(d.r+22,0);ctx.stroke()}ctx.restore()}
function drawShip(){ctx.save();for(const [i,p]of ship.trail.entries()){const a=p.life*(p.boost?.58:.34);ctx.fillStyle=p.boost?`rgba(231,255,56,${a})`:`rgba(0,245,255,${a})`;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(1,ship.r*(1-i/36)),0,TAU);ctx.fill()}const angle=Math.atan2(ship.vy,Math.max(80,260+ship.vx));ctx.translate(ship.x,ship.y);ctx.rotate(angle);ctx.globalCompositeOperation="lighter";ctx.shadowColor=ship.inv>0?"#ffffff":"#00f5ff";ctx.shadowBlur=30;ctx.fillStyle=ship.inv>0&&Math.sin(performance.now()*.03)>0?"#fff":"#00f5ff";ctx.beginPath();ctx.moveTo(22,0);ctx.lineTo(-13,-13);ctx.lineTo(-7,0);ctx.lineTo(-13,13);ctx.closePath();ctx.fill();ctx.fillStyle="#ff2bd6";ctx.beginPath();ctx.arc(-4,0,5,0,TAU);ctx.fill();ctx.restore()}
function drawParticle(p){ctx.save();ctx.globalCompositeOperation="lighter";ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=16;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill();ctx.restore()}
function loop(now){const frameStart=performance.now(),dt=Math.min(.033,(now-last)/1000||.016);last=now;if(running)tick(dt);else{for(const s of stars){s.x-=(30+120*s.z)*dt;if(s.x<-10)s.x=width+10}for(const p of bursts){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt}clean(bursts,true)}draw();recordFrame(performance.now()-frameStart,dt);requestAnimationFrame(loop)}
addEventListener("resize",resize);addEventListener("keydown",e=>{keys.add(e.code);if(e.code==="Enter"&&!running)reset();if(e.code==="KeyM"){audio.muted=!audio.muted;muteBtn.textContent=audio.muted?"Sound off":"Sound on"}if(e.ctrlKey&&e.shiftKey&&e.code==="KeyD"){e.preventDefault();setDebug(!debug.enabled)}});addEventListener("keyup",e=>keys.delete(e.code));addEventListener("pointerdown",e=>{warmAudio();pointer.active=true;pointer.x=e.clientX;pointer.y=e.clientY;if(!running&&menu.hidden===false)reset()});addEventListener("pointermove",e=>{pointer.x=e.clientX;pointer.y=e.clientY});addEventListener("pointerup",()=>pointer.active=false);addEventListener("pointercancel",()=>pointer.active=false);startBtn.addEventListener("click",()=>{warmAudio();reset()});muteBtn.addEventListener("click",()=>{audio.muted=!audio.muted;muteBtn.textContent=audio.muted?"Sound off":"Sound on"});window.NeonDriftAdmin={getState:()=>({running,score:Math.floor(score),best,boost:Math.floor(ship.boost),godMode:adminState.godMode,scoreMultiplier:adminState.scoreMultiplier,debug:debug.enabled}),setGodMode:value=>{adminState.godMode=Boolean(value);ship.inv=adminState.godMode?999999:Math.min(ship.inv,1.2);return adminState.godMode},setScoreMultiplier:value=>{adminState.scoreMultiplier=Math.max(1,Math.min(10,Number(value)||1));return adminState.scoreMultiplier},setDebug:value=>{setDebug(value);return debug.enabled},refillBoost:()=>{ship.boost=100;updateHud()},addScore:value=>{score+=Math.max(0,Number(value)||0);updateHud()},setBest:value=>{best=Math.max(0,Math.floor(Number(value)||0));localStorage.setItem("neon-drift-best",best);bestEl.textContent=best;return best},clearBest:()=>{best=0;localStorage.removeItem("neon-drift-best");bestEl.textContent=best},restart:reset};resize();setDebug(debug.enabled);requestAnimationFrame(loop);
})();
</script>
<script src="admin-config.js"></script>
<script src="admin.js"></script>
</body>
</html>
