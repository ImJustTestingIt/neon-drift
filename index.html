<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neon Drift</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fbff;
      --muted: #9fb2c7;
      --hot: #ff4d8d;
      --mint: #3ff7c6;
      --gold: #ffd166;
      --void: #04060d;
      --panel: rgba(8, 14, 27, .64);
      --line: rgba(255, 255, 255, .16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--void);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      user-select: none;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at 50% 50%, #101932 0%, #050710 54%, #010208 100%);
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      padding: clamp(14px, 2.6vw, 28px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: grid;
      gap: 3px;
      text-transform: uppercase;
      letter-spacing: .18em;
      font-weight: 800;
      font-size: clamp(12px, 1.1vw, 15px);
      text-shadow: 0 0 22px rgba(63, 247, 198, .34);
    }

    .brand strong {
      font-size: clamp(24px, 4.8vw, 58px);
      line-height: .9;
      letter-spacing: 0;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: min(520px, 60vw);
    }

    .stat {
      min-width: 92px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(18px);
      border-radius: 8px;
      box-shadow: 0 18px 55px rgba(0, 0, 0, .22);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .stat b {
      display: block;
      margin-top: 2px;
      font-size: 23px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .center {
      display: grid;
      place-items: center;
      text-align: center;
    }

    .panel {
      width: min(640px, calc(100vw - 32px));
      padding: clamp(22px, 4vw, 42px);
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 77, 141, .14), transparent 34%),
        linear-gradient(225deg, rgba(63, 247, 198, .12), transparent 36%),
        rgba(4, 8, 18, .78);
      backdrop-filter: blur(24px);
      box-shadow: 0 28px 90px rgba(0, 0, 0, .5);
      pointer-events: auto;
      transform: translateY(0);
      transition: opacity .28s ease, transform .28s ease;
    }

    .panel[hidden] {
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px) scale(.98);
    }

    .panel h1 {
      margin: 0;
      font-size: clamp(42px, 9vw, 96px);
      line-height: .82;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .panel p {
      margin: 18px auto 0;
      max-width: 42rem;
      color: #d4deec;
      font-size: clamp(15px, 2.4vw, 18px);
      line-height: 1.55;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 8px;
      padding: 13px 18px;
      background: var(--mint);
      color: #02110e;
      font: inherit;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
      cursor: pointer;
      box-shadow: 0 0 28px rgba(63, 247, 198, .38);
    }

    button.secondary {
      background: transparent;
      color: var(--ink);
      box-shadow: none;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .meter {
      width: min(260px, 48vw);
      height: 9px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .08);
    }

    .meter i {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--mint), var(--gold), var(--hot));
      box-shadow: 0 0 18px rgba(255, 209, 102, .48);
    }

    @media (max-width: 680px) {
      .hud {
        padding: 12px;
      }

      .topbar {
        align-items: stretch;
      }

      .brand strong {
        font-size: 32px;
      }

      .stats {
        max-width: 56vw;
        gap: 6px;
      }

      .stat {
        min-width: 74px;
        padding: 8px;
      }

      .stat b {
        font-size: 18px;
      }

      .bottom {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Neon Drift game canvas"></canvas>

  <div class="hud">
    <div class="topbar">
      <div class="brand"><span>Arcade run</span><strong>Neon Drift</strong></div>
      <div class="stats">
        <div class="stat"><span>Score</span><b id="score">0</b></div>
        <div class="stat"><span>Combo</span><b id="combo">x1</b></div>
        <div class="stat"><span>Best</span><b id="best">0</b></div>
      </div>
    </div>

    <div class="center">
      <section class="panel" id="menu">
        <h1>Neon Drift</h1>
        <p>Thread the gate stream, steal prism shards, and trigger overdrive before the drones turn the lane into static.</p>
        <div class="actions">
          <button id="start">Start run</button>
          <button class="secondary" id="mute">Sound on</button>
        </div>
      </section>
    </div>

    <div class="bottom">
      <div>Move: WASD / arrows / pointer</div>
      <div>
        <div>Overdrive</div>
        <div class="meter"><i id="boost"></i></div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const comboEl = document.getElementById("combo");
      const bestEl = document.getElementById("best");
      const boostEl = document.getElementById("boost");
      const menu = document.getElementById("menu");
      const startBtn = document.getElementById("start");
      const muteBtn = document.getElementById("mute");

      const TAU = Math.PI * 2;
      const keys = new Set();
      const pointer = { active: false, x: 0, y: 0 };
      const audio = { ctx: null, muted: false };

      let width = 0;
      let height = 0;
      let dpr = 1;
      let last = 0;
      let running = false;
      let shake = 0;
      let spawnGate = 0;
      let spawnShard = 0;
      let spawnDrone = 0;
      let score = 0;
      let combo = 1;
      let best = Number(localStorage.getItem("neon-drift-best") || 0);

      const ship = {
        x: 0, y: 0, vx: 0, vy: 0, r: 14,
        boost: 0, inv: 0, trail: []
      };

      const stars = [];
      const gates = [];
      const shards = [];
      const drones = [];
      const bursts = [];

      bestEl.textContent = best;

      function resize() {
        dpr = Math.min(2, window.devicePixelRatio || 1);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        if (!stars.length) {
          for (let i = 0; i < 190; i++) {
            stars.push({
              x: Math.random() * width,
              y: Math.random() * height,
              z: Math.random() * 1 + .25,
              h: Math.random() * 360
            });
          }
        }
      }

      function tone(freq, dur = .08, type = "sine", gain = .04) {
        if (audio.muted) return;
        audio.ctx ||= new (window.AudioContext || window.webkitAudioContext)();
        const now = audio.ctx.currentTime;
        const osc = audio.ctx.createOscillator();
        const vol = audio.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        osc.frequency.exponentialRampToValueAtTime(freq * .62, now + dur);
        vol.gain.setValueAtTime(gain, now);
        vol.gain.exponentialRampToValueAtTime(.0001, now + dur);
        osc.connect(vol).connect(audio.ctx.destination);
        osc.start(now);
        osc.stop(now + dur);
      }

      function reset() {
        ship.x = width * .24;
        ship.y = height * .5;
        ship.vx = 0;
        ship.vy = 0;
        ship.boost = 22;
        ship.inv = 1.2;
        ship.trail.length = 0;
        gates.length = 0;
        shards.length = 0;
        drones.length = 0;
        bursts.length = 0;
        spawnGate = .2;
        spawnShard = .9;
        spawnDrone = 2.8;
        score = 0;
        combo = 1;
        shake = 0;
        running = true;
        menu.hidden = true;
        updateHud();
      }

      function gameOver() {
        running = false;
        shake = 24;
        burst(ship.x, ship.y, "#ff4d8d", 80, 280);
        tone(90, .34, "sawtooth", .07);
        best = Math.max(best, Math.floor(score));
        localStorage.setItem("neon-drift-best", best);
        bestEl.textContent = best;
        menu.querySelector("h1").textContent = "Run Ended";
        menu.querySelector("p").textContent = `Score ${Math.floor(score)}. Best ${best}. Slip back into the stream?`;
        startBtn.textContent = "Restart";
        setTimeout(() => { menu.hidden = false; }, 500);
      }

      function updateHud() {
        scoreEl.textContent = Math.floor(score);
        comboEl.textContent = `x${combo}`;
        boostEl.style.width = `${Math.max(0, Math.min(100, ship.boost))}%`;
      }

      function burst(x, y, color, count = 18, power = 140) {
        for (let i = 0; i < count; i++) {
          const a = Math.random() * TAU;
          const s = (Math.random() * .7 + .3) * power;
          bursts.push({
            x, y,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s,
            life: Math.random() * .45 + .35,
            max: .8,
            color,
            size: Math.random() * 3 + 1.4
          });
        }
      }

      function addGate() {
        const gap = Math.max(124, height * (.32 - Math.min(.14, score / 80000)));
        const cy = gap / 2 + 50 + Math.random() * Math.max(40, height - gap - 100);
        gates.push({
          x: width + 90,
          cy,
          gap,
          w: 34,
          speed: 245 + Math.min(230, score / 85),
          passed: false,
          pulse: Math.random() * TAU
        });
      }

      function addShard() {
        shards.push({
          x: width + 40,
          y: 50 + Math.random() * (height - 100),
          r: 9,
          speed: 210 + Math.min(220, score / 110),
          spin: Math.random() * TAU
        });
      }

      function addDrone() {
        drones.push({
          x: width + 60,
          y: 70 + Math.random() * (height - 140),
          r: 17,
          speed: 185 + Math.min(260, score / 100),
          phase: Math.random() * TAU,
          amp: 38 + Math.random() * 80
        });
      }

      function steer(dt) {
        let ax = 0;
        let ay = 0;
        if (keys.has("ArrowLeft") || keys.has("KeyA")) ax -= 1;
        if (keys.has("ArrowRight") || keys.has("KeyD")) ax += 1;
        if (keys.has("ArrowUp") || keys.has("KeyW")) ay -= 1;
        if (keys.has("ArrowDown") || keys.has("KeyS")) ay += 1;

        if (pointer.active) {
          ax += (pointer.x - ship.x) / 160;
          ay += (pointer.y - ship.y) / 160;
        }

        const boosting = (keys.has("Space") || keys.has("ShiftLeft") || keys.has("ShiftRight") || pointer.active) && ship.boost > 0;
        const thrust = boosting ? 1180 : 760;
        const drag = boosting ? .942 : .925;

        ship.vx = (ship.vx + ax * thrust * dt) * drag;
        ship.vy = (ship.vy + ay * thrust * dt) * drag;
        ship.x += ship.vx * dt;
        ship.y += ship.vy * dt;
        ship.x = Math.max(ship.r + 6, Math.min(width - ship.r - 6, ship.x));
        ship.y = Math.max(ship.r + 6, Math.min(height - ship.r - 6, ship.y));

        ship.boost += (boosting ? -32 : 14) * dt;
        ship.boost = Math.max(0, Math.min(100, ship.boost));
        ship.inv = Math.max(0, ship.inv - dt);
        ship.trail.unshift({ x: ship.x, y: ship.y, life: 1, boost: boosting });
        ship.trail = ship.trail.filter((p, i) => i < 34 && (p.life -= dt * 2.6) > 0);
      }

      function tick(dt) {
        spawnGate -= dt;
        spawnShard -= dt;
        spawnDrone -= dt;
        if (spawnGate <= 0) {
          addGate();
          spawnGate = Math.max(.72, 1.38 - score / 42000);
        }
        if (spawnShard <= 0) {
          addShard();
          spawnShard = Math.max(.45, .92 - score / 70000);
        }
        if (spawnDrone <= 0) {
          addDrone();
          spawnDrone = Math.max(.74, 2.6 - score / 30000);
        }

        steer(dt);
        score += dt * (22 + combo * 3);

        for (const s of stars) {
          s.x -= (70 + 260 * s.z + score / 260) * dt;
          if (s.x < -10) {
            s.x = width + 10;
            s.y = Math.random() * height;
            s.z = Math.random() * 1 + .25;
          }
        }

        for (const g of gates) {
          g.x -= g.speed * dt;
          g.pulse += dt * 4;
          if (!g.passed && g.x + g.w < ship.x) {
            g.passed = true;
            combo = Math.min(9, combo + 1);
            score += 160 * combo;
            ship.boost = Math.min(100, ship.boost + 11);
            burst(g.x, g.cy, "#3ff7c6", 14, 110);
            tone(360 + combo * 38, .09, "triangle", .035);
          }

          const inX = Math.abs(ship.x - g.x) < g.w + ship.r;
          const badY = ship.y < g.cy - g.gap / 2 + ship.r || ship.y > g.cy + g.gap / 2 - ship.r;
          if (running && ship.inv <= 0 && inX && badY) gameOver();
        }

        for (const s of shards) {
          s.x -= s.speed * dt;
          s.spin += dt * 8;
          if (dist(ship, s) < ship.r + s.r + 7) {
            s.dead = true;
            combo = Math.min(9, combo + 1);
            score += 90 * combo;
            ship.boost = Math.min(100, ship.boost + 8);
            burst(s.x, s.y, "#ffd166", 24, 170);
            tone(650 + Math.random() * 160, .07, "sine", .045);
          }
        }

        for (const d of drones) {
          d.x -= d.speed * dt;
          d.phase += dt * 3;
          d.y += Math.sin(d.phase) * d.amp * dt;
          if (running && ship.inv <= 0 && dist(ship, d) < ship.r + d.r) gameOver();
        }

        for (const p of bursts) {
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vx *= .98;
          p.vy *= .98;
          p.life -= dt;
        }

        clean(gates);
        clean(shards);
        clean(drones);
        clean(bursts, true);
        shake = Math.max(0, shake - dt * 30);
        updateHud();
      }

      function clean(arr, particle = false) {
        for (let i = arr.length - 1; i >= 0; i--) {
          if (arr[i].dead || arr[i].x < -150 || (particle && arr[i].life <= 0)) arr.splice(i, 1);
        }
      }

      function dist(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function draw() {
        const sx = shake ? (Math.random() - .5) * shake : 0;
        const sy = shake ? (Math.random() - .5) * shake : 0;
        ctx.save();
        ctx.clearRect(0, 0, width, height);
        ctx.translate(sx, sy);

        const bg = ctx.createRadialGradient(width * .35, height * .42, 0, width * .5, height * .5, Math.max(width, height));
        bg.addColorStop(0, "#14203e");
        bg.addColorStop(.48, "#070b18");
        bg.addColorStop(1, "#010209");
        ctx.fillStyle = bg;
        ctx.fillRect(-40, -40, width + 80, height + 80);

        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        for (const s of stars) {
          ctx.fillStyle = `hsla(${185 + s.h % 60}, 96%, ${62 + s.z * 18}%, ${.16 + s.z * .4})`;
          ctx.fillRect(s.x, s.y, 1 + s.z * 2.4, 1 + s.z * 2.4);
        }
        ctx.restore();

        drawLane();
        gates.forEach(drawGate);
        shards.forEach(drawShard);
        drones.forEach(drawDrone);
        drawShip();
        bursts.forEach(drawParticle);
        ctx.restore();
      }

      function drawLane() {
        ctx.save();
        ctx.globalAlpha = .24;
        ctx.strokeStyle = "#3ff7c6";
        ctx.lineWidth = 1;
        for (let y = 0; y < height; y += 46) {
          ctx.beginPath();
          ctx.moveTo(0, y + Math.sin((score + y) * .008) * 16);
          ctx.bezierCurveTo(width * .3, y + 20, width * .68, y - 20, width, y + Math.cos(score * .01 + y) * 16);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawGate(g) {
        const glow = .5 + Math.sin(g.pulse) * .25;
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        ctx.lineWidth = g.w;
        ctx.strokeStyle = `rgba(63, 247, 198, ${.28 + glow * .22})`;
        ctx.shadowColor = "#3ff7c6";
        ctx.shadowBlur = 28;
        ctx.beginPath();
        ctx.moveTo(g.x, -20);
        ctx.lineTo(g.x, g.cy - g.gap / 2);
        ctx.moveTo(g.x, g.cy + g.gap / 2);
        ctx.lineTo(g.x, height + 20);
        ctx.stroke();

        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(255,255,255,.9)";
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(g.x, g.cy - g.gap / 2, 12, 0, TAU);
        ctx.arc(g.x, g.cy + g.gap / 2, 12, 0, TAU);
        ctx.stroke();
        ctx.restore();
      }

      function drawShard(s) {
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(s.spin);
        ctx.globalCompositeOperation = "lighter";
        ctx.shadowColor = "#ffd166";
        ctx.shadowBlur = 24;
        ctx.fillStyle = "#ffd166";
        ctx.beginPath();
        ctx.moveTo(0, -14);
        ctx.lineTo(10, 0);
        ctx.lineTo(0, 14);
        ctx.lineTo(-10, 0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawDrone(d) {
        ctx.save();
        ctx.translate(d.x, d.y);
        ctx.rotate(d.phase);
        ctx.globalCompositeOperation = "lighter";
        ctx.strokeStyle = "#ff4d8d";
        ctx.fillStyle = "rgba(255,77,141,.15)";
        ctx.shadowColor = "#ff4d8d";
        ctx.shadowBlur = 22;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, d.r, 0, TAU);
        ctx.fill();
        ctx.stroke();
        for (let i = 0; i < 4; i++) {
          ctx.rotate(Math.PI / 2);
          ctx.beginPath();
          ctx.moveTo(d.r + 4, 0);
          ctx.lineTo(d.r + 22, 0);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawShip() {
        ctx.save();
        for (const [i, p] of ship.trail.entries()) {
          const a = p.life * (p.boost ? .55 : .32);
          ctx.fillStyle = p.boost ? `rgba(255,209,102,${a})` : `rgba(63,247,198,${a})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, Math.max(1, ship.r * (1 - i / 36)), 0, TAU);
          ctx.fill();
        }

        const angle = Math.atan2(ship.vy, Math.max(80, 260 + ship.vx));
        ctx.translate(ship.x, ship.y);
        ctx.rotate(angle);
        ctx.globalCompositeOperation = "lighter";
        ctx.shadowColor = ship.inv > 0 ? "#ffffff" : "#3ff7c6";
        ctx.shadowBlur = 26;
        ctx.fillStyle = ship.inv > 0 && Math.sin(performance.now() * .03) > 0 ? "#ffffff" : "#3ff7c6";
        ctx.beginPath();
        ctx.moveTo(22, 0);
        ctx.lineTo(-13, -13);
        ctx.lineTo(-7, 0);
        ctx.lineTo(-13, 13);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#ff4d8d";
        ctx.beginPath();
        ctx.arc(-4, 0, 5, 0, TAU);
        ctx.fill();
        ctx.restore();
      }

      function drawParticle(p) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        ctx.globalAlpha = Math.max(0, p.life / p.max);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, TAU);
        ctx.fill();
        ctx.restore();
      }

      function loop(now) {
        const dt = Math.min(.033, (now - last) / 1000 || .016);
        last = now;
        if (running) tick(dt);
        else {
          for (const s of stars) {
            s.x -= (30 + 120 * s.z) * dt;
            if (s.x < -10) s.x = width + 10;
          }
          for (const p of bursts) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= dt;
          }
          clean(bursts, true);
        }
        draw();
        requestAnimationFrame(loop);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("keydown", (event) => {
        keys.add(event.code);
        if (event.code === "Enter" && !running) reset();
        if (event.code === "KeyM") {
          audio.muted = !audio.muted;
          muteBtn.textContent = audio.muted ? "Sound off" : "Sound on";
        }
      });
      window.addEventListener("keyup", (event) => keys.delete(event.code));
      window.addEventListener("pointerdown", (event) => {
        pointer.active = true;
        pointer.x = event.clientX;
        pointer.y = event.clientY;
        if (!running && menu.hidden === false) reset();
      });
      window.addEventListener("pointermove", (event) => {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
      });
      window.addEventListener("pointerup", () => { pointer.active = false; });
      window.addEventListener("pointercancel", () => { pointer.active = false; });

      startBtn.addEventListener("click", reset);
      muteBtn.addEventListener("click", () => {
        audio.muted = !audio.muted;
        muteBtn.textContent = audio.muted ? "Sound off" : "Sound on";
      });

      resize();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
