name: Deploy Neon Drift

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate admin config
        shell: bash
        env:
          ADMIN_SECRET: ${{ secrets.NEON_DRIFT_ADMIN_SECRET }}
        run: |
          if [ -n "$ADMIN_SECRET" ]; then
            ADMIN_SECRET_HASH="$(printf '%s' "$ADMIN_SECRET" | sha256sum | awk '{print $1}')"
          else
            ADMIN_SECRET_HASH="__ADMIN_SECRET_HASH__"
          fi
          printf 'window.NeonDriftAdminConfig = { secretHash: "%s" };\n' "$ADMIN_SECRET_HASH" > admin-config.js
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
